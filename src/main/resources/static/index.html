<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KTP Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; }
        .container { max-width: 900px; }
        .card { box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container">
    <h2 class="text-center mb-4">KTP Management System</h2>

    <!-- Form Section -->
    <div class="card mb-4">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0" id="formTitle">Tambah Data KTP</h5>
        </div>
        <div class="card-body">
            <form id="ktpForm">
                <input type="hidden" id="ktpId">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="nomorKtp" class="form-label">Nomor KTP</label>
                        <input type="text" class="form-control" id="nomorKtp" required>
                    </div>
                    <div class="col-md-6">
                        <label for="namaLengkap" class="form-label">Nama Lengkap</label>
                        <input type="text" class="form-control" id="namaLengkap" required>
                    </div>
                    <div class="col-12">
                        <label for="alamat" class="form-label">Alamat</label>
                        <textarea class="form-control" id="alamat" rows="2" required></textarea>
                    </div>
                    <div class="col-md-6">
                        <label for="tanggalLahir" class="form-label">Tanggal Lahir</label>
                        <input type="date" class="form-control" id="tanggalLahir" required>
                    </div>
                    <div class="col-md-6">
                        <label for="jenisKelamin" class="form-label">Jenis Kelamin</label>
                        <select class="form-select" id="jenisKelamin" required>
                            <option value="">Pilih...</option>
                            <option value="Laki-laki">Laki-laki</option>
                            <option value="Perempuan">Perempuan</option>
                        </select>
                    </div>
                    <div class="col-12 text-end">
                        <button type="button" class="btn btn-secondary" id="btnReset" style="display:none;">Batal</button>
                        <button type="submit" class="btn btn-success" id="btnSubmit">Simpan Data</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Table Section -->
    <div class="card">
        <div class="card-header bg-dark text-white">
            <h5 class="mb-0">Daftar Data KTP</h5>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0" id="ktpTable">
                    <thead class="table-light">
                        <tr>
                            <th>Nomor KTP</th>
                            <th>Nama</th>
                            <th>Alamat</th>
                            <th>Tgl Lahir</th>
                            <th>Gender</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Data will be loaded here via AJAX -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const API_URL = "http://localhost:8080/ktp";

    $(document).ready(function() {
        loadData();

        // Submit Form (Create or Update)
        $("#ktpForm").on("submit", function(e) {
            e.preventDefault();
            
            const id = $("#ktpId").val();
            const data = {
                nomorKtp: $("#nomorKtp").val(),
                namaLengkap: $("#namaLengkap").val(),
                alamat: $("#alamat").val(),
                tanggalLahir: $("#tanggalLahir").val(),
                jenisKelamin: $("#jenisKelamin").val()
            };

            const method = id ? "PUT" : "POST";
            const url = id ? `${API_URL}/${id}` : API_URL;

            $.ajax({
                url: url,
                type: method,
                contentType: "application/json",
                data: JSON.stringify(data),
                success: function() {
                    alert("Data berhasil disimpan!");
                    resetForm();
                    loadData();
                },
                error: function(xhr) {
                    const errorMsg = xhr.responseJSON ? xhr.responseJSON.message : "Terjadi kesalahan";
                    alert("Error: " + errorMsg);
                }
            });
        });

        // Reset Button
        $("#btnReset").on("click", function() {
            resetForm();
        });
    });

    function loadData() {
        $.ajax({
            url: API_URL,
            type: "GET",
            success: function(data) {
                let rows = "";
                data.forEach(ktp => {
                    rows += `
                        <tr>
                            <td>${ktp.nomorKtp}</td>
                            <td>${ktp.namaLengkap}</td>
                            <td>${ktp.alamat}</td>
                            <td>${ktp.tanggalLahir}</td>
                            <td>${ktp.jenisKelamin}</td>
                            <td>
                                <button class="btn btn-sm btn-warning" onclick="editData(${ktp.id})">Edit</button>
                                <button class="btn btn-sm btn-danger" onclick="deleteData(${ktp.id})">Hapus</button>
                            </td>
                        </tr>
                    `;
                });
                $("#ktpTable tbody").html(rows);
            }
        });
    }

    function editData(id) {
        $.ajax({
            url: `${API_URL}/${id}`,
            type: "GET",
            success: function(ktp) {
                $("#ktpId").val(ktp.id);
                $("#nomorKtp").val(ktp.nomorKtp);
                $("#namaLengkap").val(ktp.namaLengkap);
                $("#alamat").val(ktp.alamat);
                $("#tanggalLahir").val(ktp.tanggalLahir);
                $("#jenisKelamin").val(ktp.jenisKelamin);
                
                $("#formTitle").text("Update Data KTP");
                $("#btnSubmit").text("Update Data").removeClass("btn-success").addClass("btn-warning");
                $("#btnReset").show();
                window.scrollTo(0, 0);
            }
        });
    }

    function deleteData(id) {
        if (confirm("Apakah Anda yakin ingin menghapus data ini?")) {
            $.ajax({
                url: `${API_URL}/${id}`,
                type: "DELETE",
                success: function() {
                    alert("Data berhasil dihapus!");
                    loadData();
                }
            });
        }
    }

    function resetForm() {
        $("#ktpId").val("");
        $("#ktpForm")[0].reset();
        $("#formTitle").text("Tambah Data KTP");
        $("#btnSubmit").text("Simpan Data").removeClass("btn-warning").addClass("btn-success");
        $("#btnReset").hide();
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
